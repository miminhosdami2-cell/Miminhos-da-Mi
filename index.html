<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miminhos da Mi</title>

<link rel="icon" type="image/png" sizes="32x32" href="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESZQABachS_t8wMmKI4hL__gaNEWeA-jEAAvQlAAKmj0FWFSMMzvyYcaE6BA.png">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#db2777">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
:root { --rosa:#db2777; --fundo:#fff5f7; }
body { font-family:sans-serif; max-width:450px; margin:auto; padding:15px; background:var(--fundo); }

/* ===== BANNER PREMIUM ===== */
#installBanner{
position:fixed;
bottom:15px;
left:15px;
right:15px;
background:white;
border-radius:15px;
box-shadow:0 8px 25px rgba(0,0,0,0.15);
padding:15px;
display:none;
align-items:center;
justify-content:space-between;
z-index:9999;
animation:slideUp 0.4s ease;
}
#installBanner .text{ font-size:14px; }
#installBanner button{ border:none; padding:8px 12px; border-radius:8px; cursor:pointer; }
#installBtn{ background:#db2777; color:white; }
#closeBanner{ background:#eee; }

@keyframes slideUp{
from{ transform:translateY(100px); opacity:0; }
to{ transform:translateY(0); opacity:1; }
}

/* ===== RESTO ORIGINAL ===== */
#splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff5f7; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
#splash img { width: 160px; border-radius: 20px; margin-bottom: 15px; }
#splash h2 { font-size: 30px; color: var(--rosa); font-family: 'Great Vibes', cursive; }
h1 { text-align:center; margin-bottom:10px; }
h1 .logo { max-width:150px; width:100%; height:auto; border-radius:15px; display:block; margin:0 auto; }
h1 .titulo { margin-top:8px; color:var(--rosa); font-size:36px; font-weight:normal; font-family:'Great Vibes', cursive; }
.search { width:100%; padding:10px; border-radius:10px; border:1px solid #ddd; margin-bottom:10px; }
.tabs { display:flex; gap:5px; overflow:auto; margin-bottom:10px; }
.tab { padding:8px 12px; background:#eee; border-radius:10px; cursor:pointer; }
.tab.active { background:var(--rosa); color:white; }
.card { background:white; border-radius:15px; margin-bottom:20px; overflow:hidden; box-shadow:0 2px 5px rgba(0,0,0,0.05); }
.img-p { width:100%; height:220px; object-fit:cover; cursor:pointer; }
.info { padding:15px; text-align:center; }
.btn-add { background:var(--rosa); color:white; border:none; padding:10px; width:100%; border-radius:10px; cursor:pointer; }
.card-wrap { position:relative; }
.badge { position:absolute; left:10px; top:10px; background:red; color:white; padding:5px 8px; border-radius:8px; font-size:12px; font-weight:bold; }
.fav { position:absolute; right:10px; top:10px; font-size:20px; cursor:pointer; }
.paginacao { display:flex; justify-content:center; gap:8px; margin:20px 0; flex-wrap:wrap; }
.btn-pag { padding:8px 12px; border:1px solid #ddd; background:white; border-radius:5px; cursor:pointer; }
.btn-pag.active { background:var(--rosa); color:white; }
.modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:none; justify-content:center; align-items:center; }
.modal img { max-width:90%; border-radius:10px; }
.carrinho { background:white; padding:15px; border-radius:15px; margin-top:30px; }
.btn-w { background:#25D366; color:white; padding:12px; border:none; width:100%; border-radius:10px; margin-top:8px; cursor:pointer; }
.item-cart { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; }
input, select { width:100%; padding:10px; margin-top:5px; border-radius:8px; border:1px solid #ddd; }
#envio { margin-top:5px; border:1px solid #ddd; border-radius:8px; padding:10px; font-weight:bold; color:#111; }
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
<img src="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESZNBpyDNjcgFat1zgMyeFxqRGE_GUxgACpiUAAqaPQVa1bCMYXlu7BzoE.jpg">
<h2>Olá 👋</h2>
</div>

<h1>
<img src="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESZNBpyDNjcgFat1zgMyeFxqRGE_GUxgACpiUAAqaPQVa1bCMYXlu7BzoE.jpg" class="logo">
<div class="titulo">Miminhos da Mi ✨</div>
</h1>

<input class="search" id="pesquisa" placeholder="🔍 Procurar..." oninput="irParaPagina(1)">
<div class="tabs" id="tabs"></div>
<div id="loja"></div>
<div class="paginacao" id="paginacao"></div>

<div class="carrinho">
<h2>🛒 Carrinho</h2>
<p>💳 MBWay: <strong>938655760</strong></p>
<div id="itens-carrinho"></div>
<p id="total-carrinho"></p>

<input id="cliente" placeholder="Nome">
<input id="telefone" placeholder="Telefone">
<input id="morada" placeholder="Morada de envio">

<label><strong>Tipo de envio:</strong></label>
<select id="envio" onchange="atualizar()">
<option>Levantamento</option>
<option>CTT Normal</option>
<option>CTT Registado</option>
</select>

<button onclick="finalizar()" class="btn-w">WhatsApp</button>
<button onclick="copiar()" class="btn-w" style="background:#111;">Copiar Pedido</button>
<button onclick="mbway()" class="btn-w" style="background:#555;">Pagar MBWay</button>
<button onclick="limparCarrinho()" class="btn-w" style="background:#dc2626;">❌ Anular Pedido</button>
</div>

<div class="modal" id="modal" onclick="fecharModal()">
<img id="imgGrande">
</div>

<!-- ===== BANNER ===== -->
<div id="installBanner">
  <div class="text">📲 Instala a app para acesso rápido</div>
  <div style="display:flex; gap:5px;">
    <button id="installBtn">Instalar</button>
    <button id="closeBanner">✖</button>
  </div>
</div>

<script>

// SPLASH
window.addEventListener("load", () => {
setTimeout(() => { document.getElementById("splash").style.display = "none"; }, 2000);
});

// SERVICE WORKER
if ('serviceWorker' in navigator) {
window.addEventListener('load', function() {
navigator.serviceWorker.register('sw.js');
});
}

// ⚠️ AQUI FICA TODO O TEU JS ORIGINAL (API, carrinho, etc.)
// 👉 NÃO ALTERADO

/* ===== PWA PREMIUM ===== */

let deferredPrompt;
const banner = document.getElementById("installBanner");
const installBtn = document.getElementById("installBtn");
const closeBtn = document.getElementById("closeBanner");

function showBanner(){
  if(localStorage.getItem("appInstalled")) return;
  const last = localStorage.getItem("installClosed");
  if(last && Date.now() - last < 86400000) return;
  banner.style.display = "flex";
}

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  setTimeout(showBanner, 4000);
});

installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;

  if (outcome === 'accepted') {
    localStorage.setItem("appInstalled", "true");
    banner.style.display = "none";
  }

  deferredPrompt = null;
});

closeBtn.addEventListener('click', () => {
  banner.style.display = "none";
  localStorage.setItem("installClosed", Date.now());
});

window.addEventListener('appinstalled', () => {
  localStorage.setItem("appInstalled", "true");
  banner.style.display = "none";
});

</script>

</body>
</html>
