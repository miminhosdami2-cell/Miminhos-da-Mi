<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miminhos da Mi</title>
<link rel="icon" type="image/png" sizes="32x32" href="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESZQABachS_t8wMmKI4hL__gaNEWeA-jEAAvQlAAKmj0FWFSMMzvyYcaE6BA.png">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
:root { --rosa:#db2777; --fundo:#fff5f7; }
body { font-family:sans-serif; max-width:450px; margin:auto; padding:15px; background:var(--fundo); }
#splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff5f7; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
#splash img { width: 160px; border-radius: 20px; margin-bottom: 15px; }
#splash h2 { font-size: 30px; color: var(--rosa); font-family: 'Great Vibes', cursive; }
h1 { text-align:center; margin-bottom:10px; }
h1 .logo { max-width:150px; width:100%; height:auto; border-radius:15px; display:block; margin:0 auto; }
h1 .titulo { margin-top:8px; color:var(--rosa); font-size:36px; font-weight:normal; font-family:'Great Vibes', cursive; }
.search { width:100%; padding:10px; border-radius:10px; border:1px solid #ddd; margin-bottom:10px; }
.tabs-container { position: relative; margin-bottom: 15px; }
.tabs { display:flex; gap:8px; overflow-x:auto; padding: 5px 0; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
.tabs::-webkit-scrollbar { display: none; }
.tab { padding:8px 16px; background:#eee; border-radius:12px; cursor:pointer; white-space: nowrap; transition: 0.3s; font-size: 14px; }
.tab.active { background:var(--rosa); color:white; font-weight: bold; transform: scale(1.05); }
.card { background:white; border-radius:15px; margin-bottom:20px; overflow:hidden; box-shadow:0 2px 5px rgba(0,0,0,0.05); }
.img-p { width:100%; height:220px; object-fit:cover; cursor:pointer; }
.info { padding:15px; text-align:center; }
.nome-clicavel { cursor:pointer; color:var(--rosa); text-decoration:underline; margin:0 0 10px 0; }
.btn-add { background:var(--rosa); color:white; border:none; padding:10px; width:100%; border-radius:10px; cursor:pointer; }
.card-wrap { position:relative; }
.badge { position:absolute; left:10px; top:10px; background:red; color:white; padding:5px 8px; border-radius:8px; font-size:12px; font-weight:bold; }
.fav { position:absolute; right:10px; top:10px; font-size:20px; cursor:pointer; }
.paginacao { display:flex; justify-content:center; gap:8px; margin:20px 0; flex-wrap:wrap; }
.btn-pag { padding:8px 12px; border:1px solid #ddd; background:white; border-radius:5px; cursor:pointer; }
.btn-pag.active { background:var(--rosa); color:white; }
.carrinho { background:white; padding:15px; border-radius:15px; margin-top:30px; border: 1px solid var(--rosa); }
.btn-w { background:#25D366; color:white; padding:12px; border:none; width:100%; border-radius:10px; margin-top:8px; cursor:pointer; }
.modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; z-index:10000; }
.modal img { max-width:95%; max-height:90%; border-radius:10px; border: 2px solid white; }
.modal-texto { background:white; padding:25px; border-radius:20px; max-width:85%; text-align:center; position:relative; }
</style>
</head>
<body>

<div id="splash">
  <img src="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESZNBpyDNjcgFat1zgMyeFxqRGE_GUxgACpiUAAqaPQVa1bCMYXlu7BzoE.jpg">
  <h2>Olá 👋</h2>
</div>

<h1>
  <img src="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESZNBpyDNjcgFat1zgMyeFxqRGE_GUxgACpiUAAqaPQVa1bCMYXlu7BzoE.jpg" class="logo">
  <div class="titulo">Miminhos da Mi ✨</div>
</h1>

<input class="search" id="pesquisa" placeholder="🔍 Procurar em toda a loja..." oninput="irParaPagina(1)">
<div class="tabs-container"><div class="tabs" id="tabs"></div></div>
<div id="loja"></div>
<div class="paginacao" id="paginacao"></div>

<div class="carrinho">
  <h2>🛒 Carrinho</h2>
  <p>💳 MBWay: <strong>938655760</strong></p>
  <div id="itens-carrinho"></div>
  <p id="total-carrinho"></p>
  <input id="cliente" placeholder="Nome">
  <input id="telefone" placeholder="Telefone">
  <input id="morada" placeholder="Morada de envio">
  <select id="envio" onchange="atualizar()">
    <option>Levantamento</option>
    <option>CTT Normal</option>
    <option>CTT Registado</option>
  </select>
  <button onclick="finalizar()" class="btn-w">WhatsApp</button>
  <button onclick="copiar()" class="btn-w" style="background:#111;">Copiar Pedido</button>
  <button onclick="mbway()" class="btn-w" style="background:#555;">Pagar MBWay</button>
  <button onclick="limparCarrinho()" class="btn-w" style="background:#dc2626;">❌ Anular Pedido</button>
</div>

<div class="modal" id="modalImg" onclick="fecharModal()"><img id="imgGrande"></div>
<div class="modal" id="modalTexto" onclick="fecharModal()"><div class="modal-texto" onclick="event.stopPropagation()"><h3 id="tituloPedra"></h3><p id="corpoSignificado"></p><button style="background:var(--rosa);color:white;border:none;padding:10px;border-radius:10px;margin-top:10px;" onclick="fecharModal()">Fechar</button></div></div>

<script>
window.addEventListener("load", () => {
  setTimeout(() => { document.getElementById("splash").style.display = "none"; }, 2000);
});

const API = 'https://script.google.com/macros/s/AKfycbw7iXZ525CvJqAHfBR23OsiarAxrjFU_vaHA75JA7G2hjy9Xany3bvKNdkpNQP7Jch3/exec'; 
let db = [], cart = JSON.parse(localStorage.getItem("cart")) || [], favs = JSON.parse(localStorage.getItem("favs")) || [];
let categoriaAtual = localStorage.getItem("ultimaCat") || "", paginaAtual = 1;

function carregarProdutos(data){
  db = data.map(p=>({
    ...p, id: p.id ? parseInt(p.id) : null, preco: parseFloat(p.preco),
    precoPromo: p.precoPromo ? parseFloat(p.precoPromo) : null,
    promo: p.promo === "sim", categoria: p.categoria || "Outros", significado: p.significado || "" 
  })).filter(p => p.id !== null);
  
  let cats = [...new Set(db.map(p=>p.categoria))];
  if(db.some(p => p.promo)) cats = ["🔥 Promoções", ...cats];
  if(!categoriaAtual || !cats.includes(categoriaAtual)) categoriaAtual = cats[0];

  document.getElementById('tabs').innerHTML = cats.map((c)=>`<div class="tab ${c === categoriaAtual ? 'active' : ''}" onclick="mudar('${c}',this)">${c}</div>`).join("");
  renderProdutos();
  atualizar();
}

fetch(API).then(r=>r.json()).then(carregarProdutos);

function mudar(c,el){ 
  categoriaAtual = c; paginaAtual = 1; localStorage.setItem("ultimaCat", c);
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); 
  el.classList.add('active'); renderProdutos(); 
}

function irParaPagina(num){ paginaAtual=num; renderProdutos(); window.scrollTo(0,0); }

function renderProdutos(){
  let termo = document.getElementById('pesquisa').value.toLowerCase();
  let lista = db.filter(p => {
    if(termo) return p.nome.toLowerCase().includes(termo) || p.id.toString().includes(termo);
    return categoriaAtual === "🔥 Promoções" ? p.promo : p.categoria === categoriaAtual;
  });
  let itens = lista.slice((paginaAtual-1)*10, paginaAtual*10);
  let h = itens.map(p => `
    <div class="card">
      <div class="card-wrap">
        ${p.promo ? '<div class="badge">PROMO</div>' : ''}
        <span class="fav" onclick="toggleFav('${p.nome}')">${favs.includes(p.nome)?'❤️':'🤍'}</span>
        <img src="${p.img}" class="img-p" onclick="abrirImg('${p.img}')">
      </div>
      <div class="info">
        <h3 class="nome-clicavel" onclick="abrirSignificado('${p.nome}', '${p.significado.replace(/'/g, "")}')">#${p.id} - ${p.nome} ℹ️</h3>
        <p><b>${(p.promo && p.precoPromo ? p.precoPromo : p.preco).toFixed(2)}€</b></p>
        <button class="btn-add" onclick="add(${p.id})">Adicionar</button>
      </div>
    </div>`).join("");
  document.getElementById('loja').innerHTML = h || "Sem itens.";
  renderPag(lista.length);
}

function renderPag(total){
  let pags = Math.ceil(total/10); let h = "";
  if(pags > 1) for(let i=1;i<=pags;i++) h+=`<button class="btn-pag ${i===paginaAtual?'active':''}" onclick="irParaPagina(${i})">${i}</button>`;
  document.getElementById('paginacao').innerHTML = h;
}

function toggleFav(n){ favs=favs.includes(n)?favs.filter(f=>f!==n):[...favs,n]; localStorage.setItem("favs",JSON.stringify(favs)); renderProdutos(); }
function add(id){ let p=db.find(x=>x.id===id); let ex=cart.find(x=>x.id===id); if(ex) ex.qtd++; else cart.push({...p,qtd:1,preco:p.promo && p.precoPromo?p.precoPromo:p.preco}); atualizar(); }
function limparCarrinho(){ cart=[]; atualizar(); }

function atualizar(){
  localStorage.setItem("cart", JSON.stringify(cart));
  let total = cart.reduce((acc,p)=>acc+(p.qtd*p.preco),0);
  document.getElementById('itens-carrinho').innerHTML = cart.map((p,i)=>`<div class="item-cart"><span>#${p.id} - ${p.nome} (x${p.qtd})</span><div><button onclick="cart[${i}].qtd--;if(cart[${i}].qtd<=0)cart.splice(${i},1);atualizar()">-</button><button onclick="cart[${i}].qtd++;atualizar()">+</button
