<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miminhos da Mi</title>
<link rel="icon" type="image/png" href="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESZQABachS_t8wMmKI4hL__gaNEWeA-jEAAvQlAAKmj0FWFSMMzvyYcaE6BA.png">
<link rel="apple-touch-icon" href="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESZQABachS_t8wMmKI4hL__gaNEWeA-jEAAvQlAAKmj0FWFSMMzvyYcaE6BA.png">
<meta name="theme-color" content="#db2777">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
:root { --rosa:#db2777; --fundo:#fff5f7; }
body { font-family:sans-serif; max-width:450px; margin:auto; padding:15px; background:var(--fundo); }
#splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff5f7; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
#splash img { width: 160px; border-radius: 20px; margin-bottom: 15px; }
#splash h2 { font-size: 30px; color: var(--rosa); font-family: 'Great Vibes', cursive; }
h1 { text-align:center; margin-bottom:10px; }
h1 .logo { max-width:140px; width:100%; border-radius:15px; display:block; margin:0 auto; }
h1 .titulo { margin-top:8px; color:var(--rosa); font-size:36px; font-family:'Great Vibes', cursive; }
.search { width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; margin-bottom:10px; box-sizing: border-box; }

.tabs-container { position: relative; margin-bottom: 15px; overflow: hidden; }
.tabs { display:flex; gap:8px; overflow-x:auto; padding: 10px 0; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
.tabs::-webkit-scrollbar { display: none; }
.tab { padding:8px 16px; background:#eee; border-radius:12px; cursor:pointer; white-space: nowrap; transition: 0.3s; font-size: 14px; flex-shrink: 0; font-weight: bold; }
.tab.active { background:var(--rosa); color:white; transform: scale(1.05); }

.card { background:white; border-radius:15px; margin-bottom:20px; overflow:hidden; box-shadow:0 2px 5px rgba(0,0,0,0.05); }
.img-p { width:100%; height:250px; object-fit:cover; cursor:pointer; }
.info { padding:15px; text-align:center; }
.nome-clicavel { cursor:pointer; color:var(--rosa); text-decoration:underline; margin-bottom:8px; }
.btn-add { background:var(--rosa); color:white; border:none; padding:12px; width:100%; border-radius:10px; cursor:pointer; font-weight: bold; }

.carrinho { background:white; padding:20px; border-radius:15px; margin-top:30px; border: 2px solid var(--rosa); }
.item-cart { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
.btn-w { background:#25D366; color:white; padding:15px; border:none; width:100%; border-radius:10px; margin-top:10px; cursor:pointer; font-weight: bold; }

.modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; z-index:10000; }
.modal img { max-width:95%; max-height:85%; border-radius:10px; }

.paginacao { display:flex; justify-content:center; gap:8px; margin:20px 0; flex-wrap:wrap; }
.btn-pag { padding:8px 12px; border:1px solid #ddd; background:white; border-radius:5px; cursor:pointer; }
.btn-pag.active { background:var(--rosa); color:white; }
</style>
</head>
<body>

<div id="splash">
  <img src="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESZNBpyDNjcgFat1zgMyeFxqRGE_GUxgACpiUAAqaPQVa1bCMYXlu7BzoE.jpg">
  <h2>Olá 👋</h2>
</div>

<h1>
  <img src="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESZNBpyDNjcgFat1zgMyeFxqRGE_GUxgACpiUAAqaPQVa1bCMYXlu7BzoE.jpg" class="logo">
  <div class="titulo">Miminhos da Mi ✨</div>
</h1>

<input class="search" id="pesquisa" placeholder="🔍 Procurar na loja..." oninput="irParaPagina(1)">

<div class="tabs-container">
  <div class="tabs" id="tabs"></div>
</div>

<div id="loja"></div>
<div class="paginacao" id="paginacao"></div>

<div class="carrinho">
  <h2>🛒 Carrinho</h2>
  <div id="itens-carrinho"></div>
  <p id="total-carrinho" style="font-weight: bold; font-size: 18px;"></p>
  <input id="cliente" placeholder="Teu Nome" style="width:100%; padding:10px; margin-bottom:5px; border-radius:8px; border:1px solid #ddd;">
  <button onclick="finalizar()" class="btn-w">Enviar via WhatsApp</button>
  <button onclick="limparCarrinho()" style="background:none; color:red; border:none; width:100%; margin-top:10px; cursor:pointer;">Limpar Tudo</button>
</div>

<div class="modal" id="modalImg" onclick="this.style.display='none'"><img id="imgGrande"></div>

<script>
window.onload = () => setTimeout(() => document.getElementById("splash").style.display = "none", 2000);

const API = 'https://script.google.com/macros/s/AKfycbw7iXZ525CvJqAHfBR23OsiarAxrjFU_vaHA75JA7G2hjy9Xany3bvKNdkpNQP7Jch3/exec'; 
let db = [], cart = JSON.parse(localStorage.getItem("cart")) || [], categoriaAtual = "", paginaAtual = 1;

function centrarAba(texto) {
  setTimeout(() => {
    const container = document.getElementById('tabs');
    const abas = document.querySelectorAll('.tab');
    let ativa = null;
    abas.forEach(t => { if(t.innerText === texto) ativa = t; });
    if (ativa && container) {
      const scrollFinal = ativa.offsetLeft - (container.offsetWidth / 2) + (ativa.offsetWidth / 2);
      container.scrollTo({ left: scrollFinal, behavior: 'smooth' });
    }
  }, 100);
}

fetch(API).then(r=>r.json()).then(data => {
  db = data.map(p=>({
    ...p,
    id: parseInt(p.id),
    preco: parseFloat(p.preco),
    precoPromo: p.precoPromo ? parseFloat(p.precoPromo) : null,
    promo: p.promo === "sim"
  })).filter(p => !isNaN(p.id));

  let cats = [...new Set(db.map(p=>p.categoria))];
  categoriaAtual = cats[0];
  renderTabs(cats);
  renderProdutos();
  atualizar();
});

function renderTabs(cats) {
  let labels = db.some(p=>p.promo) ? ["🔥 Promoções", ...cats] : cats;
  document.getElementById('tabs').innerHTML = labels.map(c => `
    <div class="tab ${c === categoriaAtual ? 'active' : ''}" onclick="mudarCat('${c}')">${c}</div>
  `).join("");
}

function mudarCat(c) {
  categoriaAtual = c;
  paginaAtual = 1;
  document.getElementById('pesquisa').value = "";
  let cats = [...new Set(db.map(p=>p.categoria))];
  renderTabs(cats);
  renderProdutos();
  centrarAba(c);
}

function irParaPagina(n) { paginaAtual = n; renderProdutos(); window.scrollTo(0,0); }

function renderProdutos() {
  let termo = document.getElementById('pesquisa').value.toLowerCase();
  let lista = db.filter(p => {
    if(termo) return p.nome.toLowerCase().includes(termo) || p.id.toString().includes(termo);
    return categoriaAtual === "🔥 Promoções" ? p.promo : p.categoria === categoriaAtual;
  });

  let porPag = 10;
  let itens = lista.slice((paginaAtual-1)*porPag, paginaAtual*porPag);

  document.getElementById('loja').innerHTML = itens.map(p => {
    let precoFinal = (p.promo && p.precoPromo) ? p.precoPromo : p.preco;
    return `
      <div class="card">
        <img src="${p.img}" class="img-p" onclick="abrirImg('${p.img}')">
        <div class="info">
          <h3>#${p.id} - ${p.nome}</h3>
          <p style="font-weight:bold; font-size:18px;">${precoFinal.toFixed(2)}€</p>
          <button class="btn-add" onclick="add(${p.id})">Adicionar</button>
        </div>
      </div>`;
  }).join("");

  let totalPags = Math.ceil(lista.length / porPag);
  let pagHTML = "";
  for(let i=1; i<=totalPags; i++) {
    pagHTML += `<button class="btn-pag ${i===paginaAtual?'active':''}" onclick="irParaPagina(${i})">${i}</button>`;
  }
  document.getElementById('paginacao').innerHTML = totalPags > 1 ? pagHTML : "";
}

function add(id) {
  let p = db.find(x => x.id === id);
  let valor = (p.promo && p.precoPromo) ? p.precoPromo : p.preco;
  let ex = cart.find(x => x.id === id);
  if(ex) ex.qtd++; else cart.push({...p, precoFinal: valor, qtd: 1});
  localStorage.setItem("cart", JSON.stringify(cart));
  atualizar();
}

function atualizar() {
  let total = 0;
  document.getElementById('itens-carrinho').innerHTML = cart.map((p, i) => {
    total += (p.precoFinal * p.qtd);
    return `
      <div class="item-cart">
        <span>#${p.id} ${p.nome} (x${p.qtd})</span>
        <div>
          <button onclick="mudarQtd(${i},-1)">➖</button>
          <button onclick="mudarQtd(${i},1)">➕</button>
        </div>
      </div>`;
  }).join("") || "Carrinho vazio";
  document.getElementById('total-carrinho').innerText = "Total: " + total.toFixed(2) + "€";
}

function mudarQtd(i, n) {
  cart[i].qtd += n;
  if(cart[i].qtd < 1) cart.splice(i, 1);
  localStorage.setItem("cart", JSON.stringify(cart));
  atualizar();
}

function limparCarrinho() { cart = []; localStorage.removeItem("cart"); atualizar(); }

function abrirImg(src) {
  document.getElementById('modalImg').style.display = 'flex';
  document.getElementById('imgGrande').src = src;
}

function finalizar() {
  if(!cart.length) return alert("Carrinho vazio!");
  let nome = document.getElementById('cliente').value || "Cliente";
  let msg = `*Pedido Miminhos da Mi*\n*Cliente:* ${nome}\n\n` + cart.map(p => `- #${p.id} ${p.nome} (x${p.qtd})`).join("\n");
  window.open(`https://wa.me/351938655760?text=${encodeURIComponent(msg)}`);
}
</script>
</body>
</html>
