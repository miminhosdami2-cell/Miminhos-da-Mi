<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miminhos da Mi</title>

<style>
:root {
  --rosa:#c2416c;
  --fundo:#fff5f7;
}

body {
  font-family:sans-serif;
  max-width:450px;
  margin:auto;
  padding:15px;
  background:var(--fundo);
}

/* ✨ HEADER */
.topo {
  background:linear-gradient(135deg,#fff,#fde2ea);
  border-radius:15px;
  padding:20px;
  text-align:center;
  margin-bottom:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
  position:relative;
  overflow:hidden;
}

.topo::before {
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background-image:radial-gradient(white 1px, transparent 1px);
  background-size:20px 20px;
  opacity:0.3;
  animation:glitter 8s linear infinite;
}

@keyframes glitter {
  from { transform:translate(0,0); }
  to { transform:translate(-50px,-50px); }
}

.topo img {
  width:80px;
  position:relative;
  z-index:2;
}

.nome-box {
  margin-top:10px;
  background:white;
  padding:10px 15px;
  border-radius:12px;
  display:inline-block;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
  position:relative;
  z-index:2;
}

.nome-box h1 {
  margin:0;
  font-family:"Brush Script MT", cursive;
  font-size:32px;
  color:var(--rosa);
}

/* loja */
.search { width:100%; padding:10px; border-radius:10px; border:1px solid #ddd; margin-bottom:10px; }

.tabs { display:flex; gap:5px; overflow:auto; margin-bottom:10px; }
.tab { padding:8px 12px; background:#eee; border-radius:10px; cursor:pointer; }
.tab.active { background:var(--rosa); color:white; }

.card {
  background:white;
  border-radius:15px;
  margin-bottom:20px;
  overflow:hidden;
  box-shadow:0 6px 15px rgba(0,0,0,0.06);
  transition:0.2s;
}

.card:hover { transform:scale(1.02); }

.img-p { width:100%; height:220px; object-fit:cover; }

.info { padding:15px; text-align:center; }

.btn-add {
  background:var(--rosa);
  color:white;
  border:none;
  padding:10px;
  width:100%;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
}

.btn-add:active {
  transform:scale(0.95);
}

/* 💖 CORAÇÕES */
.heart {
  position:fixed;
  font-size:20px;
  animation:floatUp 1s ease-out forwards;
}

@keyframes floatUp {
  0% { opacity:1; transform:translateY(0) scale(1); }
  100% { opacity:0; transform:translateY(-80px) scale(1.5); }
}

/* carrinho */
.carrinho {
  background:white;
  padding:15px;
  border-radius:15px;
  margin-top:30px;
  box-shadow:0 6px 15px rgba(0,0,0,0.06);
}

.btn-w {
  background:#25D366;
  color:white;
  padding:12px;
  border:none;
  width:100%;
  border-radius:10px;
  margin-top:8px;
  cursor:pointer;
}

.item-cart {
  display:flex;
  justify-content:space-between;
  margin-bottom:5px;
}

input, select {
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:8px;
  border:1px solid #ddd;
}
</style>
</head>

<body>

<div class="topo">
  <img src="https://i.imgur.com/8Km9tLL.png">
  <div class="nome-box">
    <h1>Miminhos Da Mi</h1>
  </div>
</div>

<input class="search" id="pesquisa" placeholder="🔍 Procurar..." oninput="renderProdutos()">

<div class="tabs" id="tabs"></div>
<div id="loja"></div>

<div class="carrinho">
  <h2>🛒 Carrinho</h2>
  <p>💳 MBWay: <strong>938655760</strong></p>

  <div id="itens-carrinho"></div>

  <input id="cliente" placeholder="Nome">
  <input id="telefone" placeholder="Telefone">
  <input id="morada" placeholder="Morada">

  <select id="envio">
    <option>Levantamento</option>
    <option>CTT Normal</option>
    <option>CTT Registado</option>
  </select>

  <button onclick="finalizar()" class="btn-w">WhatsApp</button>
  <button onclick="limparCarrinho()" class="btn-w" style="background:#dc2626;">❌ Anular</button>
</div>

<script>
const API = 'https://sheetdb.io/api/v1/rfqtnc19zz2d2';

let db = [];
let cart = [];

fetch(API).then(r=>r.json()).then(data=>{
  db = data.map(p=>({...p,id:+p.id,preco:+p.preco}));
  renderProdutos();
});

/* 💖 efeito corações */
function coracoes(x,y){
  for(let i=0;i<5;i++){
    let h=document.createElement("div");
    h.className="heart";
    h.innerText="💖";
    h.style.left=x+"px";
    h.style.top=y+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),1000);
  }
}

function renderProdutos(){
  let termo=document.getElementById("pesquisa").value.toLowerCase();

  document.getElementById("loja").innerHTML =
    db.filter(p=>p.nome.toLowerCase().includes(termo))
    .map(p=>`
      <div class="card">
        <img src="${p.img}" class="img-p">
        <div class="info">
          <h3>${p.nome}</h3>
          <p>${p.preco.toFixed(2)}€</p>
          <button class="btn-add"
            onclick="add(${p.id}, event)">
            Adicionar
          </button>
        </div>
      </div>
    `).join("");
}

function add(id,e){
  let p=db.find(x=>x.id===id);
  let ex=cart.find(x=>x.id===id);

  if(ex) ex.qtd++;
  else cart.push({...p,qtd:1});

  atualizar();

  /* animação */
  coracoes(e.clientX,e.clientY);
}

function atualizar(){
  let total=0;

  document.getElementById("itens-carrinho").innerHTML =
    cart.map(p=>{
      total+=p.qtd*p.preco;
      return `${p.nome} x${p.qtd}`;
    }).join("") + `<hr>Total: ${total.toFixed(2)}€`;
}

function finalizar(){
  let envio=document.getElementById("envio").value;

  let msg="Pedido\nEnvio: "+envio+"\n\n";

  cart.forEach(p=>{
    msg+=p.nome+" x"+p.qtd+"\n";
  });

  window.open("https://wa.me/351938655760?text="+encodeURIComponent(msg));
}

function limparCarrinho(){
  cart=[];
  atualizar();
}
</script>

</body>
</html>
