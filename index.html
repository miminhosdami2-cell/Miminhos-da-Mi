:root {
  --rosa:#db2777;
  --fundo:#fff5f7;
  --dourado:#b45309;
}

body {
  font-family:sans-serif;
  max-width:450px;
  margin:auto;
  padding:15px;
  background:var(--fundo);
}

h1 {
  text-align:center;
  color:var(--rosa);
  font-family:serif;
}

/* Pesquisa */
.search {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-bottom:10px;
}

/* Tabs */
.tabs {
  display:flex;
  overflow-x:auto;
  gap:5px;
  margin-bottom:10px;
}

.tab {
  padding:8px 12px;
  background:#eee;
  border-radius:10px;
  cursor:pointer;
  white-space:nowrap;
}

.tab.active {
  background:var(--rosa);
  color:white;
}

/* Cards */
.card {
  background:white;
  border-radius:15px;
  margin-bottom:20px;
  overflow:hidden;
  box-shadow:0 6px 10px rgba(0,0,0,0.08);
  transition:0.2s;
}

.card:hover {
  transform:scale(1.02);
}

.img-p {
  width:100%;
  height:230px;
  object-fit:cover;
}

.info {
  padding:15px;
  text-align:center;
}

.btn-add {

  color:white;
  border:none;
  padding:10px;
  width:100%;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

/* Carrinho */
.carrinho {
  background:white;
  padding:20px;
  border-radius:15px;
  margin-top:30px;
}

  justify-content:space-between;
  align-items:center;
  margin-bottom:8px;
}

.qtd {
  display:flex;
  gap:5px;
}

  padding:5px 8px;

}

}
