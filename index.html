  <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miminhos da Mi</title>

<style>
:root { --rosa:#db2777; --fundo:#fff5f7; }

body {
  font-family:sans-serif;
  max-width:450px;
  margin:auto;
  padding:15px;
  background:var(--fundo);
}

h1 { text-align:center; color:var(--rosa); }

.search {
  width:100%; padding:10px; border-radius:10px;
  border:1px solid #ddd; margin-bottom:10px;
}

.tabs { display:flex; gap:5px; overflow:auto; margin-bottom:10px; }
.tab { padding:8px 12px; background:#eee; border-radius:10px; cursor:pointer; }
.tab.active { background:var(--rosa); color:white; }

.card {
  background:white; border-radius:15px;
  margin-bottom:20px; overflow:hidden;
}

.img-p { width:100%; height:220px; object-fit:cover; cursor:pointer; }

.info { padding:15px; text-align:center; }

.btn-add {
  background:var(--rosa); color:white;
  border:none; padding:10px; width:100%;
  border-radius:10px;
}

.fav {
  position:absolute;
  right:10px;
  top:10px;
  font-size:20px;
  cursor:pointer;
}

.card-wrap { position:relative; }

.modal {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal img {
  max-width:90%;
  border-radius:10px;
}

.carrinho {
  background:white;
  padding:15px;
  border-radius:15px;
}

.btn-w {
  background:#25D366;
  color:white;
  padding:12px;
  border:none;
  width:100%;
  border-radius:10px;
  margin-top:8px;
}

.item-cart {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:5px;
}
</style>
</head>

<body>

<h1>Miminhos da Mi ✨</h1>

<input class="search" id="pesquisa" placeholder="🔍 Procurar..." oninput="renderProdutos()">

<div class="tabs" id="tabs"></div>
<div id="loja"></div>

<div class="carrinho">
  <h2>Carrinho</h2>

  <p>💳 MBWay: <strong>938655760</strong></p>

  <div id="itens-carrinho"></div>

  <p id="portes"></p>

  <input id="cliente" placeholder="Nome">
  <input id="telefone" placeholder="Telefone">
  <input id="morada" placeholder="Morada de envio">

  <select id="envio" onchange="calcularPortes()">
    <option value="0">Levantamento</option>
    <option value="2">CTT Normal (+2€)</option>
    <option value="4">CTT Registado (+4€)</option>
  </select>

  <button onclick="finalizar()" class="btn-w">WhatsApp</button>
  <button onclick="copiar()" class="btn-w" style="background:#111;">Copiar Pedido</button>
  <button onclick="mbway()" class="btn-w" style="background:#555;">Pagar MBWay</button>
  <button onclick="limparCarrinho()" class="btn-w" style="background:#dc2626;">❌ Anular Pedido</button>
</div>

<div class="modal" id="modal" onclick="fecharModal()">
  <img id="imgGrande">
</div>

<script>
const API = 'https://sheetdb.io/api/v1/rfqtnc19zz2d2';

let db = [];
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let favs = JSON.parse(localStorage.getItem("favs")) || [];
let categoriaAtual = "";

// guardar carrinho
function guardar(){
  localStorage.setItem("cart", JSON.stringify(cart));
}

// carregar produtos (AGORA COM ID DO SHEETS)
fetch(API).then(r=>r.json()).then(data=>{
  db = data.map(p=>({
    ...p,
    id: parseInt(p.id),
    preco: parseFloat(p.preco),
    categoria: p.categoria || "Outros"
  }));

  let categorias = [...new Set(db.map(p=>p.categoria))];

  let tabs="";
  categorias.forEach((c,i)=>{
    tabs+=`<div class="tab ${i==0?'active':''}" onclick="mudar('${c}',this)">${c}</div>`;
  });

  document.getElementById('tabs').innerHTML = tabs;
  categoriaAtual = categorias[0];
  renderProdutos();
  atualizar();
});

function mudar(c,el){
  categoriaAtual=c;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderProdutos();
}

// mostrar produtos
function renderProdutos(){
  let termo = document.getElementById('pesquisa').value.toLowerCase();
  let h="";

  db.filter(p=>p.categoria==categoriaAtual && p.nome.toLowerCase().includes(termo))
  .forEach(p=>{
    let fav = favs.includes(p.nome) ? "❤️" : "🤍";

    h+=`
    <div class="card">
      <div class="card-wrap">
        <span class="fav" onclick="toggleFav('${p.nome}')">${fav}</span>
        <img src="${p.img}" class="img-p" onclick="abrirImg('${p.img}')">
      </div>
      <div class="info">
        <h3>#${p.id} - ${p.nome}</h3>
        <p>${p.preco}€</p>
        <button class="btn-add" onclick="add(${p.id})">Adicionar</button>
      </div>
    </div>`;
  });

  document.getElementById('loja').innerHTML = h;
}

// favoritos
function toggleFav(nome){
  if(favs.includes(nome)){
    favs = favs.filter(f=>f!==nome);
  } else {
    favs.push(nome);
  }
  localStorage.setItem("favs", JSON.stringify(favs));
  renderProdutos();
}

// imagem
function abrirImg(src){
  document.getElementById('modal').style.display="flex";
  document.getElementById('imgGrande').src=src;
}
function fecharModal(){
  document.getElementById('modal').style.display="none";
}

// carrinho
function add(id){
  let produto = db.find(p=>p.id === id);
  let ex = cart.find(p=>p.id === id);

  if(ex) ex.qtd++;
  else cart.push({...produto, qtd:1});

  guardar();
  atualizar();
}

function mais(i){ cart[i].qtd++; guardar(); atualizar(); }

function menos(i){
  cart[i].qtd--;
  if(cart[i].qtd<=0) cart.splice(i,1);
  guardar();
  atualizar();
}

function limparCarrinho(){
  if(confirm("Anular pedido?")){
    cart=[];
    guardar();
    atualizar();
  }
}

function atualizar(){
  let h=""; let total=0;

  cart.forEach((p,i)=>{
    let sub = p.qtd * p.preco;
    total+=sub;

    h+=`
    <div class="item-cart">
      <span>#${p.id} - ${p.nome} x${p.qtd}</span>
      <div>
        <button onclick="menos(${i})">➖</button>
        <button onclick="mais(${i})">➕</button>
      </div>
    </div>`;
  });

  let envio = parseFloat(document.getElementById('envio').value);
  total += envio;

  document.getElementById('itens-carrinho').innerHTML = h + `<hr>Total: ${total.toFixed(2)}€`;
  document.getElementById('portes').innerText = "Portes: " + envio + "€";
}

function calcularPortes(){
  atualizar();
}

// gerar texto
function gerarTexto(){
  let n = document.getElementById('cliente').value;
  let t = document.getElementById('telefone').value;
  let m = document.getElementById('morada').value;

  if(cart.length === 0){
    alert("Carrinho vazio!");
    return "";
  }

  let msg = "Pedido\n";
  msg += "Nome: " + n + "\n";
  msg += "Tel: " + t + "\n\n";

  cart.forEach(p=>{
    msg += "#" + p.id + " - " + p.nome + " x" + p.qtd + "\n";
  });

  msg += "\nMorada: " + m;

  return encodeURIComponent(msg);
}

// whatsapp
function finalizar(){
  let texto = gerarTexto();
  if(!texto) return;

  window.open(`https://wa.me/351938655760?text=${texto}`);
}

// copiar
function copiar(){
  let texto = decodeURIComponent(gerarTexto());
  navigator.clipboard.writeText(texto);
  alert("Pedido copiado!");
}

// mbway
function mbway(){
  alert("Paga para 938655760 e envia comprovativo 😊");
}
</script>

</body>
</html>
