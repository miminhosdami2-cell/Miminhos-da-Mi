<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miminhos da Mi</title>

<style>
:root { --rosa:#db2777; --fundo:#fff5f7; }

body {
  font-family:sans-serif;
  max-width:450px;
  margin:auto;
  padding:15px;
  background:var(--fundo);
}

/* NOVO HEADER */
.header {
  text-align:center;
  background:white;
  border-radius:15px;
  padding:10px;
  margin-bottom:15px;
  border:2px solid #f3d2d8;
}

.header img {
  width:70px;
  margin-bottom:5px;
}

.header h1 {
  font-family:cursive;
  color:#c2416c;
  margin:0;
  font-size:28px;
}

/* resto igual */
.search {
  width:100%; padding:10px; border-radius:10px;
  border:1px solid #ddd; margin-bottom:10px;
}

.tabs { display:flex; gap:5px; overflow:auto; margin-bottom:10px; }
.tab { padding:8px 12px; background:#eee; border-radius:10px; cursor:pointer; }
.tab.active { background:var(--rosa); color:white; }

.card {
  background:white; border-radius:15px;
  margin-bottom:20px; overflow:hidden;
  box-shadow:0 2px 5px rgba(0,0,0,0.05);
}

.img-p { width:100%; height:220px; object-fit:cover; cursor:pointer; }

.info { padding:15px; text-align:center; }

.btn-add {
  background:var(--rosa); color:white;
  border:none; padding:10px; width:100%;
  border-radius:10px; cursor:pointer;
}

.card-wrap { position:relative; }

.badge {
  position:absolute;
  left:10px;
  top:10px;
  background:red;
  color:white;
  padding:5px 8px;
  border-radius:8px;
  font-size:12px;
  font-weight:bold;
}

.fav {
  position:absolute;
  right:10px;
  top:10px;
  font-size:20px;
  cursor:pointer;
}

.paginacao {
  display:flex;
  justify-content:center;
  gap:8px;
  margin:20px 0;
  flex-wrap:wrap;
}

.btn-pag {
  padding:8px 12px;
  border:1px solid #ddd;
  background:white;
  border-radius:5px;
  cursor:pointer;
}

.btn-pag.active {
  background:var(--rosa);
  color:white;
}

.modal {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal img {
  max-width:90%;
  border-radius:10px;
}

.carrinho {
  background:white;
  padding:15px;
  border-radius:15px;
  margin-top:30px;
}

.btn-w {
  background:#25D366;
  color:white;
  padding:12px;
  border:none;
  width:100%;
  border-radius:10px;
  margin-top:8px;
  cursor:pointer;
}

.item-cart {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:5px;
}

input {
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:8px;
  border:1px solid #ddd;
}
</style>
</head>

<body>

<!-- NOVO HEADER -->
<div class="header">
  <img src="https://i.imgur.com/8Km9tLL.png"> <!-- podes trocar pela tua imagem -->
  <h1>Miminhos Da Mi</h1>
</div>

<input class="search" id="pesquisa" placeholder="🔍 Procurar..." oninput="irParaPagina(1)">

<div class="tabs" id="tabs"></div>
<div id="loja"></div>
<div class="paginacao" id="paginacao"></div>

<div class="carrinho">
  <h2>🛒 Carrinho</h2>

  <p>💳 MBWay: <strong>938655760</strong></p>

  <div id="itens-carrinho"></div>

  <input id="cliente" placeholder="Nome">
  <input id="telefone" placeholder="Telefone">
  <input id="morada" placeholder="Morada de envio">

  <button onclick="finalizar()" class="btn-w">WhatsApp</button>
  <button onclick="copiar()" class="btn-w" style="background:#111;">Copiar Pedido</button>
  <button onclick="mbway()" class="btn-w" style="background:#555;">Pagar MBWay</button>
  <button onclick="limparCarrinho()" class="btn-w" style="background:#dc2626;">❌ Anular Pedido</button>
</div>

<div class="modal" id="modal" onclick="fecharModal()">
  <img id="imgGrande">
</div>

<script>
const API = 'https://sheetdb.io/api/v1/rfqtnc19zz2d2';

let db = [];
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let favs = JSON.parse(localStorage.getItem("favs")) || [];
let categoriaAtual = "";
let paginaAtual = 1;
const itensPorPagina = 10;

function guardar(){
  localStorage.setItem("cart", JSON.stringify(cart));
}

function carregarProdutos(data){
  db = data.map(p=>({
    ...p,
    id: parseInt(p.id),
    preco: parseFloat(p.preco),
    precoPromo: p.precoPromo ? parseFloat(p.precoPromo) : null,
    promo: p.promo === "sim",
    categoria: p.categoria || "Outros"
  }));

  let categorias = [...new Set(db.map(p=>p.categoria))];

  document.getElementById('tabs').innerHTML =
    categorias.map((c,i)=>`<div class="tab ${i==0?'active':''}" onclick="mudar('${c}',this)">${c}</div>`).join("");

  if(!categoriaAtual) categoriaAtual = categorias[0];

  renderProdutos();
  atualizar();
}

fetch(API).then(r=>r.json()).then(data=>carregarProdutos(data));

function mudar(c,el){
  categoriaAtual=c;
  paginaAtual=1;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderProdutos();
}

function irParaPagina(num){
  paginaAtual=num;
  renderProdutos();
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderProdutos(){
  let termo = document.getElementById('pesquisa').value.toLowerCase();

  let lista = db.filter(p=>
    p.categoria==categoriaAtual &&
    p.nome.toLowerCase().includes(termo)
  );

  let totalPaginas = Math.ceil(lista.length / itensPorPagina);
  let inicio = (paginaAtual - 1) * itensPorPagina;
  let itens = lista.slice(inicio, inicio + itensPorPagina);

  let h="";
  itens.forEach(p=>{

    let preco = (p.promo && p.precoPromo) ? p.precoPromo : p.preco;

    h+=`
    <div class="card">
      <img src="${p.img}" class="img-p">
      <div class="info">
        <h3>#${p.id} - ${p.nome}</h3>
        <p>${preco.toFixed(2)}€</p>
        <button class="btn-add" onclick="add(${p.id})">Adicionar</button>
      </div>
    </div>`;
  });

  document.getElementById('loja').innerHTML = h;
}

function add(id){
  let produto = db.find(p=>p.id===id);
  let precoFinal = (produto.promo && produto.precoPromo) ? produto.precoPromo : produto.preco;

  let ex = cart.find(p=>p.id===id);
  if(ex) ex.qtd++;
  else cart.push({...produto, preco:precoFinal, qtd:1});

  guardar();
  atualizar();
}

function atualizar(){
  let total=0;
  let h="";

  cart.forEach((p,i)=>{
    let sub = p.qtd * p.preco;
    total+=sub;

    h+=`
    <div class="item-cart">
      <span>#${p.id} - ${p.nome} x${p.qtd}</span>
    </div>`;
  });

  document.getElementById('itens-carrinho').innerHTML =
    h + `<hr>Total: ${total.toFixed(2)}€`;
}

function gerarTexto(){
  let n = document.getElementById('cliente').value;
  let t = document.getElementById('telefone').value;
  let m = document.getElementById('morada').value;

  let msg = "Pedido\n";
  msg += "Nome: " + n + "\n";
  msg += "Tel: " + t + "\n\n";

  cart.forEach(p=>{
    msg += "#" + p.id + " - " + p.nome + " x" + p.qtd + "\n";
  });

  msg += "\nMorada: " + m;

  return encodeURIComponent(msg);
}

function finalizar(){
  let texto = gerarTexto();
  window.open(`https://wa.me/351938655760?text=${texto}`);
}

function copiar(){
  let texto = decodeURIComponent(gerarTexto());
  navigator.clipboard.writeText(texto);
  alert("Pedido copiado!");
}

function mbway(){
  alert("Paga para 938655760 😊");
}
</script>

</body>
</html>
