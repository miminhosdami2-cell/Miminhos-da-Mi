<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Miminhos da Mi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial; max-width: 400px; margin: auto; padding: 10px; background:#f5f5f5;">

<h1 style="text-align:center;">Miminhos da Mi</h1>

<h2>Produtos</h2>
<div id="produtos"></div>

<h2>Carrinho</h2>
<div id="carrinho"></div>

<h3>Nome do Cliente</h3>
<input id="nomeCliente" placeholder="O teu nome" style="width:100%; padding:8px; margin-bottom:10px;">

<button onclick="enviar()" style="width:100%; padding:12px; background:green; color:white; border:none; border-radius:10px; font-size:16px;">
Finalizar via WhatsApp
</button>

<script>
let produtos = [
  {
    nome:"Colares",
    preco:12,
    img:"https://mega.nz/file/o4pFRRAB#PVRAq1EggAVteTkbDl7-SW6ozl_bQ5cixWzEkkAl0Yo"
  },
  {
    nome:"Brincos",
    preco:3.5,
    img:"LINK_DA_IMAGEM_BRINCOS"
  },
  {
    nome:"Cristais",
    preco:2.5,
    img:"LINK_DA_IMAGEM_CRISTAIS"
  }
];

let carrinho = [];

function mostrarProdutos(){
  let html="";
  produtos.forEach((p,i)=>{
    html += `
    <div style="border:1px solid #ddd; margin:8px 0; padding:10px; border-radius:12px; background:white;">
      
      <img src="${p.img}" style="width:100%; border-radius:10px;">
      
      <h3>${p.nome}</h3>
      <p><strong>${p.preco}€</strong></p>

      <button onclick="add(${i})"
        style="background:black; color:white; padding:8px 12px; border:none; border-radius:8px;">
        Adicionar
      </button>
    </div>`;
  });
  document.getElementById("produtos").innerHTML = html;
}

function add(i){
  carrinho.push(produtos[i]);
  mostrarCarrinho();
}

function mostrarCarrinho(){
  let html="";
  let total = 0;

  carrinho.forEach(p=>{
    html += `<div>${p.nome} - ${p.preco}€</div>`;
    total += p.preco;
  });

  html += `<hr><strong>Total: ${total}€</strong>`;
  document.getElementById("carrinho").innerHTML = html;
}

function enviar(){
  let nome = document.getElementById("nomeCliente").value;
  let msg="Encomenda:%0A";
  
  if(nome){
    msg += "Cliente: " + nome + "%0A%0A";
  }

  let total=0;

  carrinho.forEach(p=>{
    msg += p.nome + " - " + p.preco + "€%0A";
    total += p.preco;
  });

  msg += "%0ATotal: " + total + "€";

  window.open("https://wa.me/351938655760?text=" + msg);
}

mostrarProdutos();
</script>

</body>
</html>
