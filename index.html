<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Miminhos da Mi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="https://via.placeholder.com/100?text=App">
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      font-family: Arial;
      max-width: 400px;
      margin: auto;
      padding: 10px;
      background:#f5f5f5;
    }
    h1, h2 { text-align: center; }
    button.install-btn {
      width:100%;
      padding:12px;
      background:#007bff;
      color:white;
      border:none;
      border-radius:10px;
      font-size:16px;
      margin-bottom:10px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<h1>Miminhos da Mi</h1>

<!-- Botão de instalar automático -->
<button id="installBtn" class="install-btn" style="display:none;">Instalar App</button>

<h2>Produtos</h2>
<div id="produtos"></div>

<h2>Carrinho</h2>
<div id="carrinho"></div>

<button onclick="enviar()" style="width:100%; padding:12px; background:green; color:white; border:none; border-radius:10px; font-size:16px;">
Finalizar via WhatsApp
</button>

<script>
let produtos = [
  { nome:"Colares", preco:12, img:"https://via.placeholder.com/100?text=Colares" },
  { nome:"Brincos", preco:3.5, img:"https://via.placeholder.com/100?text=Brincos" },
  { nome:"Cristais", preco:2.5, img:"https://via.placeholder.com/100?text=Cristais" }
];

let carrinho = [];

function mostrarProdutos(){
  let html="";
  produtos.forEach((p,i)=>{
    html += `
    <div style="border:1px solid #ddd; margin:8px 0; padding:10px; border-radius:12px; background:white;">
      <img src="${p.img}" style="width:100%; border-radius:10px;">
      <h3>${p.nome}</h3>
      <p><strong>${p.preco}€</strong></p>
      <button onclick="add(${i})"
        style="background:black; color:white; padding:8px 12px; border:none; border-radius:8px;">
        Adicionar
      </button>
    </div>`;
  });
  document.getElementById("produtos").innerHTML = html;
}

function add(i){
  carrinho.push(produtos[i]);
  mostrarCarrinho();
}

function mostrarCarrinho(){
  let html="";
  let total = 0;
  carrinho.forEach(p=>{
    html += `<div>${p.nome} - ${p.preco}€</div>`;
    total += p.preco;
  });
  html += `<hr><strong>Total: ${total}€</strong>`;
  document.getElementById("carrinho").innerHTML = html;
}

function enviar(){
  let msg="Encomenda:%0A";
  let total=0;
  carrinho.forEach(p=>{
    msg += p.nome + " - " + p.preco + "€%0A";
    total += p.preco;
  });
  msg += "Total: " + total + "€";
  window.open("https://wa.me/351938655760?text=" + msg);
}

mostrarProdutos();

/*---------------------------
Botão de instalar PWA automático
---------------------------*/
let deferredPrompt;
const installBtn = document.getElementById('installBtn');

// Captura evento do navegador
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  // Mostra botão
  installBtn.style.display = 'block';
  // Clica automaticamente depois de 1s
  setTimeout(() => {
    installBtn.click();
  }, 1000);
});

// Ao clicar (automático ou manual)
installBtn.addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') {
      console.log('Usuário aceitou instalar o app');
    } else {
      console.log('Usuário cancelou a instalação');
    }
    deferredPrompt = null;
    installBtn.style.display = 'none';
  }
});

/*---------------------------
Registar Service Worker (obrigatório PWA)
---------------------------*/
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js')
  .then(() => console.log('Service Worker registado'))
  .catch(err => console.log('Erro ao registar SW:', err));
}
</script>

</body>
</html>
