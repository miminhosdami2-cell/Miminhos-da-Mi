  <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miminhos da Mi</title>

<link rel="icon" type="image/png" sizes="32x32" href="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESZQABachS_t8wMmKI4hL__gaNEWeA-jEAAvQlAAKmj0FWFSMMzvyYcaE6BA.png">

<meta name="theme-color" content="#db2777">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
:root { --rosa:#db2777; --fundo:#fff5f7; }
body { font-family:sans-serif; max-width:450px; margin:auto; padding:15px; background:var(--fundo); }

/* BOTÃO INSTALAR */
#installBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: var(--rosa);
  color: white;
  border: none;
  padding: 12px 16px;
  border-radius: 30px;
  font-weight: bold;
  display: none;
  z-index: 9999;
}

/* SPLASH */
#splash {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #fff5f7;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}
#splash img { width:160px; border-radius:20px; margin-bottom:15px; }
#splash h2 { font-size:30px; color:var(--rosa); font-family:'Great Vibes', cursive; }

h1 { text-align:center; margin-bottom:10px; }
.logo { max-width:150px; display:block; margin:auto; border-radius:15px; }
.titulo { margin-top:8px; color:var(--rosa); font-size:36px; font-family:'Great Vibes', cursive; }

.search { width:100%; padding:10px; border-radius:10px; border:1px solid #ddd; margin-bottom:10px; }
.tabs { display:flex; gap:5px; overflow:auto; margin-bottom:10px; }
.tab { padding:8px 12px; background:#eee; border-radius:10px; cursor:pointer; }
.tab.active { background:var(--rosa); color:white; }

.card { background:white; border-radius:15px; margin-bottom:20px; overflow:hidden; }
.img-p { width:100%; height:220px; object-fit:cover; cursor:pointer; }
.info { padding:15px; text-align:center; }
.btn-add { background:var(--rosa); color:white; border:none; padding:10px; width:100%; border-radius:10px; }

.card-wrap { position:relative; }
.badge { position:absolute; left:10px; top:10px; background:red; color:white; padding:5px 8px; border-radius:8px; font-size:12px; }
.fav { position:absolute; right:10px; top:10px; font-size:20px; cursor:pointer; }

.paginacao { display:flex; justify-content:center; gap:8px; margin:20px 0; flex-wrap:wrap; }
.btn-pag { padding:8px 12px; border:1px solid #ddd; background:white; border-radius:5px; }
.btn-pag.active { background:var(--rosa); color:white; }

.modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:none; justify-content:center; align-items:center; }
.modal img { max-width:90%; border-radius:10px; }

.carrinho { background:white; padding:15px; border-radius:15px; margin-top:30px; }
.btn-w { background:#25D366; color:white; padding:12px; border:none; width:100%; border-radius:10px; margin-top:8px; }

.item-cart { display:flex; justify-content:space-between; margin-bottom:5px; }

input, select { width:100%; padding:10px; margin-top:5px; border-radius:8px; border:1px solid #ddd; }
</style>
</head>

<body>

<!-- BOTÃO -->
<button id="installBtn">📲 Instalar</button>

<!-- SPLASH -->
<div id="splash">
  <img src="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESZNBpyDNjcgFat1zgMyeFxqRGE_GUxgACpiUAAqaPQVa1bCMYXlu7BzoE.jpg">
  <h2>Olá 👋</h2>
</div>

<h1>
<img src="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESZNBpyDNjcgFat1zgMyeFxqRGE_GUxgACpiUAAqaPQVa1bCMYXlu7BzoE.jpg" class="logo">
<div class="titulo">Miminhos da Mi ✨</div>
</h1>

<input class="search" id="pesquisa" placeholder="🔍 Procurar..." oninput="irParaPagina(1)">
<div class="tabs" id="tabs"></div>
<div id="loja"></div>
<div class="paginacao" id="paginacao"></div>

<script>

/* SPLASH */
window.addEventListener("load", () => {
  setTimeout(() => {
    document.getElementById("splash").style.display = "none";
  }, 2000);
});

/* BOTÃO INSTALAR */
let deferredPrompt;
const installBtn = document.getElementById("installBtn");

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = "block";
});

installBtn.addEventListener("click", async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt = null;
    installBtn.style.display = "none";
  } else {
    alert("No iPhone:\n\n1. Clica em Partilhar 📤\n2. 'Adicionar ao ecrã principal'");
  }
});

/* RESTO APP */
const API = 'https://sheetdb.io/api/v1/rfqtnc19zz2d2';
let db = [];

function carregarProdutos(data){
  db = data;
  renderProdutos();
}

fetch(API).then(r=>r.json()).then(data=>carregarProdutos(data));

function renderProdutos(){
  let h="";
  db.forEach(p=>{
    h+=`
    <div class="card">
      <img src="${p.img}" class="img-p">
      <div class="info">
        <h3>${p.nome}</h3>
        <p>${p.preco}€</p>
        <button class="btn-add">Adicionar</button>
      </div>
    </div>`;
  });
  document.getElementById('loja').innerHTML = h;
}
</script>

</body>
</html>
