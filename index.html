<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miminhos da Mi</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
:root { --rosa:#db2777; --fundo:#fff5f7; }
body { font-family:sans-serif; max-width:450px; margin:auto; padding:15px; background:var(--fundo); }
h1 { text-align:center; margin-bottom:10px; }
h1 .logo { max-width:150px; width:100%; height:auto; border-radius:15px; display:block; margin:0 auto; }
h1 .titulo { margin-top:8px; color:var(--rosa); font-size:36px; font-weight:normal; font-family:'Great Vibes', cursive; }
.search { width:100%; padding:10px; border-radius:10px; border:1px solid #ddd; margin-bottom:10px; }
.tabs { display:flex; gap:8px; overflow-x:auto; margin-bottom:10px; }
.tab { padding:8px 16px; background:#eee; border-radius:12px; cursor:pointer; white-space: nowrap; }
.tab.active { background:var(--rosa); color:white; }
.card { background:white; border-radius:15px; margin-bottom:20px; overflow:hidden; box-shadow:0 2px 5px rgba(0,0,0,0.05); }
.img-p { width:100%; height:220px; object-fit:cover; cursor:pointer; }
.info { padding:15px; text-align:center; }
.btn-add { background:var(--rosa); color:white; border:none; padding:10px; width:100%; border-radius:10px; cursor:pointer; }
.paginacao { display:flex; justify-content:center; gap:8px; margin:20px 0; }
.btn-pag { padding:8px 12px; border:1px solid #ddd; background:white; border-radius:5px; cursor:pointer; }
.btn-pag.active { background:var(--rosa); color:white; }
.carrinho { background:white; padding:15px; border-radius:15px; margin-top:30px; border: 1px solid var(--rosa); }
.btn-w { background:#25D366; color:white; padding:12px; border:none; width:100%; border-radius:10px; margin-top:8px; cursor:pointer; }
.modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; z-index:10000; }
.modal-texto { background:white; padding:25px; border-radius:20px; max-width:85%; text-align:center; }
</style>
</head>
<body>

<h1>
  <img src="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESZNBpyDNjcgFat1zgMyeFxqRGE_GUxgACpiUAAqaPQVa1bCMYXlu7BzoE.jpg" class="logo">
  <div class="titulo">Miminhos da Mi ✨</div>
</h1>

<input class="search" id="pesquisa" placeholder="🔍 Procurar..." oninput="irParaPagina(1)">
<div class="tabs" id="tabs"></div>
<div id="loja">A carregar produtos...</div>
<div class="paginacao" id="paginacao"></div>

<div class="carrinho">
  <h2>🛒 Carrinho</h2>
  <div id="itens-carrinho"></div>
  <p id="total-carrinho"></p>
  <input id="cliente" placeholder="Nome">
  <input id="telefone" placeholder="Telefone">
  <input id="morada" placeholder="Morada">
  <select id="envio" onchange="atualizar()"><option>Levantamento</option><option>CTT Normal</option></select>
  <button onclick="finalizar()" class="btn-w">WhatsApp</button>
</div>

<div class="modal" id="modalImg" onclick="this.style.display='none'"><img id="imgGrande" style="max-width:90%"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbw7iXZ525CvJqAHfBR23OsiarAxrjFU_vaHA75JA7G2hjy9Xany3bvKNdkpNQP7Jch3/exec';
let db = [], cart = JSON.parse(localStorage.getItem("cart")) || [];
let categoriaAtual = localStorage.getItem("ultimaCat") || "";
let paginaAtual = 1;

fetch(API).then(r=>r.json()).then(data => {
    db = data.map(p => ({...p, id: parseInt(p.id), preco: parseFloat(p.preco), promo: p.promo === "sim"}));
    // Random
    db.sort(() => Math.random() - 0.5);
    let cats = [...new Set(db.map(p=>p.categoria))];
    categoriaAtual = categoriaAtual || cats[0];
    document.getElementById('tabs').innerHTML = cats.map(c => `<div class="tab ${c===categoriaAtual?'active':''}" onclick="mudar('${c}',this)">${c}</div>`).join("");
    renderProdutos();
    atualizar();
});

function mudar(c, el) { categoriaAtual = c; paginaAtual = 1; renderProdutos(); }

function renderProdutos() {
    let lista = db.filter(p => p.categoria === categoriaAtual);
    let h = lista.slice((paginaAtual-1)*10, paginaAtual*10).map(p => `
        <div class="card">
            <img src="${p.img}" class="img-p" onclick="abrirImg('${p.img}')">
            <div class="info"><h3>#${p.id} - ${p.nome}</h3><p>${p.preco.toFixed(2)}€</p>
            <button class="btn-add" onclick="add(${p.id})">Adicionar</button></div>
        </div>`).join("");
    document.getElementById('loja').innerHTML = h || "Nenhum item.";
}

function add(id) {
    let p = db.find(x=>x.id===id);
    let ex = cart.find(x=>x.id===id);
    if(ex) ex.qtd++; else cart.push({...p, qtd:1});
    localStorage.setItem("cart", JSON.stringify(cart)); atualizar();
}

function atualizar() {
    let t = cart.reduce((acc,p) => acc + (p.preco * p.qtd), 0);
    document.getElementById('itens-carrinho').innerHTML = cart.map(p => `<div>#${p.id} - ${p.nome} (x${p.qtd})</div>`).join("");
    document.getElementById('total-carrinho').innerText = "Total: " + t.toFixed(2) + "€";
}

function finalizar() {
    let msg = "Pedido Miminhos da Mi:\n" + cart.map(p=>`#${p.id} - ${p.nome} (x${p.qtd})`).join("\n");
    window.open(`https://wa.me/351938655760?text=${encodeURIComponent(msg)}`);
}

function abrirImg(s) { document.getElementById('imgGrande').src=s; document.getElementById('modalImg').style.display='flex'; }
</script>
</body>
</html>
