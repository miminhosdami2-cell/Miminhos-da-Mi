<link rel="apple-touch-icon" href="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESZQABachS_t8wMmKI4hL__gaNEWeA-jEAAvQlAAKmj0FWFSMMzvyYcaE6BA.png">

<style>
:root { --rosa:#db2777; --fundo:#fff5f7; }
body { font-family:sans-serif; max-width:450px; margin:auto; padding:15px; background:var(--fundo); color: #333; }

#splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff5f7; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
#splash img { width: 160px; border-radius: 20px; margin-bottom: 15px; }
#splash h2 { font-size: 30px; color: var(--rosa); font-family: 'Great Vibes', cursive; }

h1 { text-align:center; margin-bottom:10px; }
h1 .logo { max-width:150px; width:100%; border-radius:15px; display:block; margin:0 auto; }
h1 .titulo { margin-top:8px; color:var(--rosa); font-size:36px; font-family:'Great Vibes', cursive; }

.search { width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; margin-bottom:15px; box-sizing: border-box; }

.tabs-container { position: relative; margin-bottom: 15px; overflow: hidden; }
.tabs { display:flex; gap:8px; overflow-x:auto; padding: 10px 0; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
.tabs::-webkit-scrollbar { display: none; }
.tab { padding:8px 18px; background:#eee; border-radius:12px; cursor:pointer; white-space: nowrap; transition: 0.3s; font-size: 14px; flex-shrink: 0; font-weight: bold; border: 1px solid transparent; }
.tab.active { background:var(--rosa); color:white; transform: scale(1.05); }

.card { background:white; border-radius:15px; margin-bottom:20px; overflow:hidden; box-shadow:0 2px 5px rgba(0,0,0,0.05); position: relative; }
.card-wrap { position: relative; }
.badge { position:absolute; left:10px; top:10px; background:red; color:white; padding:5px 8px; border-radius:8px; font-size:12px; font-weight:bold; z-index: 2; }
.fav { position:absolute; right:10px; top:10px; font-size:22px; cursor:pointer; z-index: 2; }
.img-p { width:100%; height:250px; object-fit:cover; cursor:pointer; display: block; }

.info { padding:15px; text-align:center; }
.nome-clicavel { cursor:pointer; color:var(--rosa); text-decoration:underline; font-size: 18px; margin: 0 0 10px 0; }
.btn-add { background:var(--rosa); color:white; border:none; padding:12px; width:100%; border-radius:10px; cursor:pointer; font-weight: bold; }

/* Ajuste Fino nos botões de quantidade do carrinho */
.carrinho { background:white; padding:20px; border-radius:15px; margin-top:30px; border: 2px solid var(--rosa); }
.item-cart { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
.cart-btns { display: flex; gap: 8px; align-items: center; }
.cart-btns button { background: #f0f0f0; border: 1px solid #ddd; width: 40px; height: 40px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 20px; display: flex; align-items: center; justify-content: center; }
.cart-btns button:active { background: #e0e0e0; }

.btn-w { background:#25D366; color:white; padding:15px; border:none; width:100%; border-radius:10px; margin-top:8px; cursor:pointer; font-weight: bold; font-size: 16px; }

.modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; z-index:10000; }
.modal img { max-width:95%; max-height:85%; border-radius:10px; }
.modal-texto { background:white; padding:25px; border-radius:20px; max-width:85%; text-align:center; }

.paginacao { display:flex; justify-content:center; gap:8px; margin:20px 0; flex-wrap:wrap; }
.btn-pag { padding:8px 14px; border:1px solid #ddd; background:white; border-radius:8px; cursor:pointer; }
.btn-pag.active { background:var(--rosa); color:white; border-color: var(--rosa); }

input, select { width:100%; padding:12px; margin-top:8px; border-radius:8px; border:1px solid #ddd; box-sizing: border-box; }
</style>
</head>
<body>

<div id="splash">
  <img src="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESZNBpyDNjcgFat1zgMyeFxqRGE_GUxgACpiUAAqaPQVa1bCMYXlu7BzoE.jpg">
  <h2>Olá 👋</h2>
</div>

<h1>
  <img src="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESZNBpyDNjcgFat1zgMyeFxqRGE_GUxgACpiUAAqaPQVa1bCMYXlu7BzoE.jpg" class="logo">
  <div class="titulo">Miminhos da Mi ✨</div>
</h1>

<input class="search" id="pesquisa" placeholder="🔍 Procurar em toda a loja..." oninput="irParaPagina(1)">

<div class="tabs-container">
  <div class="tabs" id="tabs"></div>
</div>

<div id="loja"></div>
<div class="paginacao" id="paginacao"></div>

<div class="carrinho">
  <h2>🛒 O Teu Pedido</h2>
  <p>💳 MBWay: <strong>938655760</strong></p>

  <p id="total-carrinho" style="font-size: 18px; margin: 15px 0; border-top: 1px solid #eee; padding-top: 10px;"></p>

    <option>CTT Normal</option>

  <button onclick="copiar()" class="btn-w" style="background:#111;">Copiar Resumo</button>
  <button onclick="limparCarrinho()" class="btn-w" style="background:#dc2626; font-size: 12px; padding: 8px;">Anular Pedido</button>
</div>

<div class="modal" id="modalImg" onclick="fecharModal()"><img id="imgGrande"></div>
<div class="modal" id="modalTexto" onclick="fecharModal()">

    <p id="corpoSignificado" style="line-height:1.6;"></p>
    <button onclick="fecharModal()" style="background:var(--rosa); color:white; border:none; padding:10px 20px; border-radius:10px; margin-top:15px; cursor:pointer;">Fechar</button>

<script>
window.onload = () => setTimeout(() => document.getElementById("splash").style.display = "none", 2000);

const API = 'https://script.google.com/macros/s/AKfycbw7iXZ525CvJqAHfBR23OsiarAxrjFU_vaHA75JA7G2hjy9Xany3bvKNdkpNQP7Jch3/exec'; 
let db = [], cart = JSON.parse(localStorage.getItem("cart")) || [], favs = JSON.parse(localStorage.getItem("favs")) || [];
let categoriaAtual = localStorage.getItem("ultimaCat") || "", paginaAtual = 1;
const itensPorPagina = 10;

function centrarAba(texto) {
  setTimeout(() => {
    const container = document.getElementById('tabs');
    const abas = document.querySelectorAll('.tab');
    let ativa = null;
    abas.forEach(t => { if(t.innerText === texto) ativa = t; });
    if (ativa && container) {
      const scrollFinal = ativa.offsetLeft - (container.offsetWidth / 2) + (ativa.offsetWidth / 2);
      container.scrollTo({ left: scrollFinal, behavior: 'smooth' });
    }
  }, 100);
}

function carregarProdutos(data){
  db = data.map(p=>({
    ...p,
    id: parseInt(p.id),
    preco: parseFloat(p.preco),
    precoPromo: p.precoPromo ? parseFloat(p.precoPromo) : null,
    promo: p.promo === "sim",
    categoria: p.categoria || "Outros",
    significado: p.significado || ""
  })).filter(p => !isNaN(p.id));

  let cats = [...new Set(db.map(p=>p.categoria))];
  if(!categoriaAtual) categoriaAtual = cats[0];
  
  renderTabs(cats);
  renderProdutos();
  atualizar();
  centrarAba(categoriaAtual);
}

function renderTabs(cats) {
  let labels = db.some(p=>p.promo) ? ["🔥 Promoções", ...cats] : cats;
  document.getElementById('tabs').innerHTML = labels.map(c => `
    <div class="tab ${c === categoriaAtual ? 'active' : ''}" onclick="mudarCat('${c}')">${c}</div>
  `).join("");
}

fetch(API).then(r=>r.json()).then(carregarProdutos);

function mudarCat(c) {
  categoriaAtual = c;
  paginaAtual = 1;
  localStorage.setItem("ultimaCat", c);
  document.getElementById('pesquisa').value = "";
  renderTabs([...new Set(db.map(p=>p.categoria))]);
  renderProdutos();
  centrarAba(c);
}

function irParaPagina(n) { paginaAtual = n; renderProdutos(); window.scrollTo(0,0); }

function renderProdutos() {
  let termo = document.getElementById('pesquisa').value.toLowerCase();
  let lista = db.filter(p => {
    if(termo) return p.nome.toLowerCase().includes(termo) || p.id.toString().includes(termo);
    return categoriaAtual === "🔥 Promoções" ? p.promo : p.categoria === categoriaAtual;
  });

  let itens = lista.slice((paginaAtual-1)*itensPorPagina, paginaAtual*itensPorPagina);

  document.getElementById('loja').innerHTML = itens.map(p => {
    let isFav = favs.includes(p.nome) ? "❤️" : "🤍";
    let precoHTML = p.promo && p.precoPromo 
      ? `<p style="text-decoration:line-through;color:#999;font-size:13px;margin:0;">${p.preco.toFixed(2)}€</p>
         <p style="color:red;font-weight:bold;font-size:20px;margin:5px 0;">${p.precoPromo.toFixed(2)}€ 🔥</p>`
      : `<p style="font-weight:bold;font-size:20px;margin:10px 0;">${p.preco.toFixed(2)}€</p>`;

    return `
      <div class="card">
        <div class="card-wrap">
          ${p.promo ? '<div class="badge">PROMO</div>' : ''}
          <span class="fav" onclick="toggleFav('${p.nome}')">${isFav}</span>
          <img src="${p.img}" class="img-p" onclick="abrirImg('${p.img}')">
        </div>
        <div class="info">
          <h3 class="nome-clicavel" onclick="abrirSignificado('${p.nome}', '${p.significado.replace(/'/g, "\\'")}')">#${p.id} - ${p.nome} ℹ️</h3>
          ${precoHTML}
          <button class="btn-add" onclick="add(${p.id})">Adicionar ao Pedido</button>
        </div>
      </div>`;
  }).join("");

  let totalPags = Math.ceil(lista.length / itensPorPagina);
  let pagHTML = "";
  for(let i=1; i<=totalPags; i++) {
    pagHTML += `<button class="btn-pag ${i===paginaAtual?'active':''}" onclick="irParaPagina(${i})">${i}</button>`;
  }
  document.getElementById('paginacao').innerHTML = totalPags > 1 ? pagHTML : "";
}

function add(id) {
  let p = db.find(x => x.id === id);
  let valor = (p.promo && p.precoPromo) ? p.precoPromo : p.preco;
  let ex = cart.find(x => x.id === id);
  if(ex) ex.qtd++; else cart.push({...p, precoFinal: valor, qtd: 1});
  localStorage.setItem("cart", JSON.stringify(cart));
  atualizar();
}

function atualizar() {
  let total = 0;
  document.getElementById('itens-carrinho').innerHTML = cart.map((p, i) => {
    total += (p.precoFinal * p.qtd);
    return `
      <div class="item-cart">
        <span>#${p.id} ${p.nome} (x${p.qtd})</span>
        <div class="cart-btns">
          <button onclick="mudarQtd(${i},-1)">➖</button>
          <button onclick="mudarQtd(${i},1)">➕</button>
        </div>
      </div>`;
  }).join("") || "<p style='color:#888'>O teu carrinho está vazio...</p>";
  
  let envio = document.getElementById('envio').value;
  document.getElementById('total-carrinho').innerHTML = `<strong>Total: ${total.toFixed(2)}€</strong><br><small>Método: ${envio}</small>`;
}

function mudarQtd(i, n) {
  cart[i].qtd += n;
  if(cart[i].qtd < 1) cart.splice(i, 1);
  localStorage.setItem("cart", JSON.stringify(cart));
  atualizar();
}

function limparCarrinho() { if(confirm("Anular pedido?")){ cart = []; localStorage.removeItem("cart"); atualizar(); } }
function abrirImg(src) { document.getElementById('modalImg').style.display = 'flex'; document.getElementById('imgGrande').src = src; }
function abrirSignificado(nome, texto) {
  document.getElementById('tituloPedra').innerText = nome;
  document.getElementById('corpoSignificado').innerText = texto || "Significado disponível em breve! ✨";
  document.getElementById('modalTexto').style.display = 'flex';
}
function fecharModal() { document.getElementById('modalImg').style.display = 'none'; document.getElementById('modalTexto').style.display = 'none'; }

function toggleFav(n) {
  if(favs.includes(n)) favs = favs.filter(f => f !== n);
  else favs.push(n);
  localStorage.setItem("favs", JSON.stringify(favs));
  renderProdutos();
}

function copiar(){
  let total = cart.reduce((acc,p)=> acc + (p.precoFinal*p.qtd), 0);
  let resumo = `Pedido Miminhos da Mi - Total: ${total.toFixed(2)}€`;
  navigator.clipboard.writeText(resumo);
  alert("Resumo copiado!");
}

  if(!cart.length) return alert("Carrinho vazio!");
  let nome = document.getElementById('cliente').value;
  let tel = document.getElementById('telefone').value;
  let morada = document.getElementById('morada').value;
